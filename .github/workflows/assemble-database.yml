name: Assemble Database

# Validates the source shards and assembles the published JSON files at the repo
# root. Runs on any push that touches source/, and on manual dispatch. If
# validation fails the job fails loudly and commits nothing. If the assembled
# output is unchanged nothing is committed. This file contains no em dashes by
# project policy.

on:
  push:
    branches:
      - main
      - finn/db-pipeline
    paths:
      - 'source/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: assemble-database-${{ github.ref }}
  cancel-in-progress: false

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Validate and assemble
        run: python build/assemble.py

      - name: Stage assembled output and detect changes
        id: detect
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            broadcast_lenses.json broadcast_lens_details.json \
            cine_lenses.json cine_lens_details.json \
            ptz_cameras.json ptz_details.json ptz-details.json \
            devices.json lenses.json lens-details.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No output changes to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git commit -m "chore: assemble database outputs from source shards"
          fi

      - name: Push assembled output
        if: steps.detect.outputs.changed == 'true'
        uses: ad-m/github-push-action@v1.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
